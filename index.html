<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公證訊息例稿產生器</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 載入 Babel 以在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- SVG 圖示組件 ---
        const CopyIcon = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        );

        const CheckCircleIcon = ({ className = "w-4 h-4 text-green-500" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        // --- 公證常數 ---
        const DOC_TYPES = [
            { id: 'lease', label: '租賃' },
            { id: 'loan', label: '借貸' },
            { id: 'will', label: '遺囑' },
            { id: 'guardianship', label: '意定監護' },
            { id: 'other', label: '其他' }
        ];

        const PERSON_TYPES_1 = [
            { id: 'principal', label: '本人' },
            { id: 'companyRep', label: '公司代表人' },
            { id: 'agent', label: '代理人' },
            { id: 'companyAgent', label: '公司代理人' }
        ];

        const PERSON_TYPES_2 = [
            ...PERSON_TYPES_1,
            { id: 'none', label: '無' }
        ];

        const ADDITIONAL_ATTENDEES = [
            { id: 'guarantor', label: '連帶保證人本人', ruleKey: 'principal' },
            { id: 'witness', label: '見證人本人', ruleKey: 'principal' },
            { id: 'interpreter', label: '通譯本人', ruleKey: 'principal' }
        ];

        const TYPE_TITLES = {
            lease: ['出租人', '承租人'],
            loan: ['貸與人', '借用人'],
            guardianship: ['委任人', '受任人'],
            will: ['遺囑人', ''],
            other: ['', '']
        };

        const TYPE_DOCS = {
            lease: '建物權狀正本、建物稅單正本',
            loan: '收付款項存摺正本、匯款單等憑據正本',
            guardianship: '委任人及受任人戶籍謄本(記事不省略)、會同開具財產清冊之人身分證影本(若有指定)',
            will: '戶政事務所申請謄本(遺囑人戶籍謄本、每一位現存繼承人戶籍謄本、已往生繼承人除戶謄本)、國稅局或稅捐處申請財產清單、建物權狀正本、土地權狀正本、存摺正本',
            other: ''
        };

        const PERSON_DOC_RULES = {
            principal: '攜帶身分證正本及印章',
            companyRep: '攜帶最新公司設立(變更)登記事項表正本、代表人身分證正本、公司大小章',
            agent: '攜帶授權書(蓋印鑑章)、本人身分證影本、本人印鑑證明、本人印鑑章(非必要)、代理人身分證正本及印章',
            companyAgent: '攜帶最新公司設立(變更)登記事項表抄錄本正本(向主管機關或線上申請抄錄本，要加蓋公司大小章，不要自己影印)、公司代表人身分證影本、授權書(蓋登記事項表上公司大小章)、公司大小章(非必要)、代理人身分證正本及印章'
        };

        const FEE_RULES = {
            lease: '根據房屋現值(稅單寫的)，與租金總額(租約寫的)比較，較高者加上押金，按公證費用標準表收費',
            loan: '依借貸本息總額，按公證費用標準表收費',
            guardianship: '通常依10年份報酬總額，按公證費用標準表收費，若未約定報酬，預估費用1000元',
            will: '依財產清單，按公證費用標準表收費',
            other: ''
        };

        const QUESTIONS_RULES = {
            lease: `1.您是房東還是房客? 
2.租約是營業或住宅?
3.房東房客是否都是個人(非公司)?
4.租約使用公證人範本或自備?
5.為計算公證費用請提供「租金、租期、押金」並傳送最近一期房屋稅單過來`,
            loan: `1.請提供借款本金(金額)、借款期間(借款開始年月日)、還款期限(年)、約定利率(年息%)
2.將貸與人收受還款的帳戶存摺封面傳送過來。
3.常見交付借款方式是公證結束後，貸與人前往銀行臨櫃匯款，再返回公證人事務所，將匯款單等憑據提供給公證人，公證人才把公證書正本交付給雙方`,
            guardianship: `1.雙方必須神智清楚、能溝通、能簽名?
2.填妥意定監護契約範本後傳送給公證人確認`,
            will: `1.遺囑人姓名? 中文聽說讀寫及精神皆正常? 有辦法親自持筆書寫遺囑全部內容?
2.遺囑人有無配偶? 存歿?
3.遺囑人有幾名子女? 存歿?
4.(若遺囑人子女先逝) 逝世子女有幾名子女(孫輩)? 存歿?
5.遺囑人父母存歿?
6.遺囑人有幾名兄弟姐妹? 存歿?
7.遺囑人祖父母存歿?
8.遺囑人想分配的財產?`,
            other: ``
        };

        // --- 認證常數 ---
        const CERT_TYPES = [
            { id: 'single', label: '單身' },
            { id: 'poa', label: '委託授權' },
            { id: 'work', label: '工作證明' },
            { id: 'degree', label: '學位證書及成績單' },
            { id: 'police', label: '良民證' },
            { id: 'household', label: '戶籍謄本' },
            { id: 'passport', label: '護照(請先簽名)' },
            { id: 'license', label: '駕照' },
            { id: 'idcard', label: '身分證' },
            { id: 'translation', label: '翻譯' },
            { id: 'other', label: '其他' }
        ];

        const CERT_REGIONS = [
            { id: 'none', label: '無 / 國內使用' },
            { id: 'mainland', label: '大陸' },
            { id: 'other_country', label: '其他國家' }
        ];

        const CERT_QUESTIONS = [
            "【詢問】文件類型? 數量?",
            "【詢問】文件使用地區? 用途?",
            "【注意】查證需要時間，當下無法取件，會再電話通知取件。",
            "文件格式、內容、數量等，請逕向收受文件單位詢問。",
            "請先將文件拍照或掃描傳送給公證人，重要個資可以用手指或物品擋住。"
        ];

        // --- 預約與轉介常數 ---
        const BOOKING_INFO_LIST = [
            "林昱朋公證人事務所工作時間平日10-17，地址新北市永和區永和路二段57號7樓（靠近頂溪捷運站1號出口中興街口），電話 0277296396 。",
            "請轉帳至 永豐銀行（807）營業部（1217）帳號 20201800381055 帳戶 戶名林昱朋。",
            "統編：61377262、抬頭：臺灣新北地方法院所屬民間公證人林昱朋事務所"
        ];

        const REFERRAL_INFO_LIST = [
            `您好，建議您前往新北地院公證處辦理，免預約，現場抽號碼牌。\n\n臺灣新北地方法院 公證處\n服務時間8:30~12:30、13:30~17:30\n電話02-22616714分機 5047或5048\n地址 新北市土城區青雲路152號6樓(家樂福樓上)\n停車 家樂福土城店停車場、金城立體停車場\n\n從 林昱朋公證人事務所 到 新北地院公證處 方式：搭乘706路公車 從中興街口上車 往三峽方向 在 臺灣新北地方法院（金城）下車。`,
            `您好，您的情況建議向法院聲請「監護宣告」或「輔助宣告」，請在上班時間聯繫新北地院訴訟輔導科詢問辦理方式，謝謝。\n\n臺灣新北地方法院 訴訟輔導科\n電話（02）2261-6714\n轉分機1001或1002或1003號\n地址新北市土城區金城路2段249號`
        ];

        const formatWithNewlines = (text) => text.split('、').join('\n');

        function App() {
            const [mainMode, setMainMode] = useState('notarize'); // 'notarize' | 'certify' | 'booking' | 'fee'

            // -- 公證狀態 --
            const [docType, setDocType] = useState('lease');
            const [person1, setPerson1] = useState('principal');
            const [person2, setPerson2] = useState('none');
            const [additionalSelected, setAdditionalSelected] = useState({});
            const [otherDocs, setOtherDocs] = useState('');
            const [feeMode, setFeeMode] = useState('default');
            const [manualFee, setManualFee] = useState('');

            // -- 認證狀態 --
            const [certType, setCertType] = useState('single');
            const [certPerson, setCertPerson] = useState('principal');
            const [certRegion, setCertRegion] = useState('none');
            const [certOtherDocs, setCertOtherDocs] = useState('');
            const [certFee, setCertFee] = useState('');

            // -- 預約狀態 --
            const [bookingDateInput, setBookingDateInput] = useState('');

            // -- 費用狀態 --
            const [houseValue, setHouseValue] = useState('');
            const [rentInputType, setRentInputType] = useState('auto'); // 'auto' | 'direct'
            const [monthlyRent, setMonthlyRent] = useState('');
            const [leaseTerm, setLeaseTerm] = useState('');
            const [totalRentInput, setTotalRentInput] = useState('');
            const [depositInput, setDepositInput] = useState('');

            // -- 複製狀態 --
            const [copyStatus1, setCopyStatus1] = useState(false);
            const [copyStatus2, setCopyStatus2] = useState(false);
            const [copiedLineIndex, setCopiedLineIndex] = useState(null);
            
            // 預約與轉介複製狀態
            const [copyBookingConfirm, setCopyBookingConfirm] = useState(false);
            const [copiedBookingInfoIndex, setCopiedBookingInfoIndex] = useState(null);
            const [copiedReferralIndex, setCopiedReferralIndex] = useState(null);

            // 費用模式複製狀態
            const [copyFeeResult, setCopyFeeResult] = useState(false);

            const toggleAdditional = (id) => {
                setAdditionalSelected(prev => ({ ...prev, [id]: !prev[id] }));
            };

            // 處理八位數日期時間格式轉換 (預約模式)
            const parsedBookingDateStr = useMemo(() => {
                if (!/^\d{8}$/.test(bookingDateInput)) {
                    return '[請輸入8位數字日期時間]';
                }
                const month = parseInt(bookingDateInput.substring(0, 2), 10);
                const day = parseInt(bookingDateInput.substring(2, 4), 10);
                const hour = parseInt(bookingDateInput.substring(4, 6), 10);
                const minute = bookingDateInput.substring(6, 8);
                const currentYear = new Date().getFullYear();
                const d = new Date(currentYear, month - 1, day);
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                
                return `${currentYear}年${month}月${day}日星期${weekdays[d.getDay()]} ${hour}時${minute}分`;
            }, [bookingDateInput]);

            const outputBookingConfirmText = `（＊到七樓按電鈴＊）為您保留 ${parsedBookingDateStr} 的時間，本事務所在 新北市永和區永和路二段57號7樓 （豪泰大樓 威肯商務中心）電話 0277296396 若要取消請提早告知，謝謝。`;

            // 處理費用計算邏輯 (費用模式)
            const feeCalculationResult = useMemo(() => {
                const vHouse = parseInt(houseValue) || 0;
                let vTotalRent = 0;
                let vDeposit = 0;

                if (rentInputType === 'auto') {
                    vTotalRent = (parseInt(monthlyRent) || 0) * (parseInt(leaseTerm) || 0);
                    vDeposit = (parseInt(monthlyRent) || 0) * 2;
                } else {
                    vTotalRent = parseInt(totalRentInput) || 0;
                    vDeposit = parseInt(depositInput) || 0;
                }

                const maxVal = Math.max(vHouse, vTotalRent);
                const targetValue = maxVal + vDeposit;

                let baseFee = 0;
                let isError = false;

                if (targetValue === 0) {
                    baseFee = 0;
                } else if (targetValue <= 200000) {
                    baseFee = 1500;
                } else if (targetValue <= 500000) {
                    baseFee = 3000;
                } else if (targetValue <= 1000000) {
                    baseFee = 4500;
                } else if (targetValue <= 2000000) {
                    baseFee = 6000;
                } else if (targetValue <= 5000000) {
                    baseFee = 7500;
                } else if (targetValue <= 10000000) {
                    baseFee = 9000;
                } else if (targetValue <= 20000000) {
                    baseFee = 12000;
                } else {
                    isError = true;
                }

                let outputText = '';
                if (isError) {
                    outputText = "價額超過20,000,000元無法計算，請查閱公證費用標準表。";
                } else {
                    outputText = `【公證費用】\n本件房屋現值${vHouse}元，與租金總額${vTotalRent}元比較，較高者加上押金${vDeposit}元，本件價額${targetValue}元，按公證費用標準表收基本費用${baseFee}元。`;
                }

                return { vTotalRent, vDeposit, outputText, isError };
            }, [houseValue, rentInputType, monthlyRent, leaseTerm, totalRentInput, depositInput]);


            // 處理公證與認證的主輸出文字
            const output1Text = useMemo(() => {
                let result = '';

                if (mainMode === 'notarize') {
                    const titles = TYPE_TITLES[docType];
                    const attendees = [];

                    const p1Label = PERSON_TYPES_1.find(p => p.id === person1).label;
                    attendees.push({
                        name: `${titles[0]}${p1Label}`,
                        ruleKey: person1
                    });

                    if (person2 !== 'none') {
                        const p2Label = PERSON_TYPES_2.find(p => p.id === person2).label;
                        attendees.push({
                            name: `${titles[1]}${p2Label}`,
                            ruleKey: person2
                        });
                    }

                    ADDITIONAL_ATTENDEES.forEach(att => {
                        if (additionalSelected[att.id]) {
                            attendees.push({
                                name: att.label,
                                ruleKey: att.ruleKey
                            });
                        }
                    });

                    result += `【應到場人】\n`;
                    result += attendees.map(a => a.name).join('\n') + '\n\n';

                    result += `【應備文件】\n`;
                    const tDocs = TYPE_DOCS[docType];
                    if (tDocs) {
                        result += formatWithNewlines(tDocs) + '\n\n';
                    }

                    const personDocs = attendees.map(att => {
                        const ruleText = PERSON_DOC_RULES[att.ruleKey];
                        return formatWithNewlines(`${att.name}${ruleText}`);
                    });
                    result += personDocs.join('\n\n') + '\n';

                    if (otherDocs.trim()) {
                        result += '\n' + otherDocs.trim() + '\n';
                    }

                    result += `\n【公證費用】\n`;
                    if (feeMode === 'default') {
                        const feeText = FEE_RULES[docType];
                        if (feeText) result += feeText + '\n';
                    } else {
                        result += `預估公證費用新台幣${manualFee || ' '}元\n`;
                    }

                } else if (mainMode === 'certify') {
                    const cTypeLabel = CERT_TYPES.find(t => t.id === certType).label;
                    const cPersonLabel = PERSON_TYPES_1.find(p => p.id === certPerson).label;
                    
                    const attendeeStr = `${cTypeLabel} ${cPersonLabel}`;

                    result += `【應到場人】\n${attendeeStr}\n\n`;

                    result += `【應備文件】\n`;
                    let baseDocsStr = '';
                    if (certType === 'single') {
                        baseDocsStr = '結婚人7日內在戶政事務所申請的戶籍謄本(建議全戶且記事不省略)、曾結婚者7日內在戶政事務所申請離婚證書或死亡證明、結婚對象身分證(存在手機)';
                    } else if (certType === 'poa') {
                        baseDocsStr = '委託授權書';
                    } else if (['work', 'degree', 'police', 'household'].includes(certType)) {
                        baseDocsStr = cTypeLabel;
                    } else if (['passport', 'license', 'idcard'].includes(certType)) {
                        baseDocsStr = cTypeLabel + '影本(自行選擇彩色或黑白影印，每一份都必須相同)';
                    } else if (certType === 'translation') {
                        baseDocsStr = '原件(經外館驗證)、翻譯文件(檔案經公證人確認翻譯正確無誤再列印)';
                    } else if (certType === 'other') {
                        baseDocsStr = '文件';
                    }

                    result += formatWithNewlines(baseDocsStr) + '\n';

                    if (certRegion === 'mainland') {
                        result += '至少帶5份來，帶走2份\n';
                    } else if (certRegion === 'other_country') {
                        result += '要帶走幾份，就多帶1份過來，最多帶6份來，帶走5份\n';
                    }
                    
                    result += '\n';

                    const personRuleText = PERSON_DOC_RULES[certPerson];
                    result += formatWithNewlines(`${attendeeStr}${personRuleText}`) + '\n';

                    if (certOtherDocs.trim()) {
                        result += '\n' + certOtherDocs.trim() + '\n';
                    }

                    result += `\n【公證費用】\n預估認證費用新台幣${certFee || ' '}元\n`;
                }

                return result.trim();
            }, [
                mainMode, 
                docType, person1, person2, additionalSelected, otherDocs, feeMode, manualFee,
                certType, certPerson, certRegion, certOtherDocs, certFee
            ]);

            const output2Text = useMemo(() => {
                if (mainMode === 'notarize') {
                    return QUESTIONS_RULES[docType] || '無預設詢問事項';
                }
                return '';
            }, [mainMode, docType]);

            const handleCopy = (text, setStatus) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setStatus(true);
                    setTimeout(() => setStatus(false), 2000);
                } catch (err) {
                    console.error('複製失敗', err);
                }
                document.body.removeChild(textArea);
            };

            const handleCopyLine = (text, setStatusIndex, idx) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setStatusIndex(idx);
                    setTimeout(() => setStatusIndex(null), 2000);
                } catch (err) {
                    console.error('複製失敗', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-6xl mx-auto space-y-6">
                        
                        <header className="text-center mb-6">
                            <h1 className="text-3xl font-bold text-slate-900 tracking-tight">公證訊息例稿產生器</h1>
                            <p className="text-slate-500 mt-2">快速勾選生成標準作業訊息，自動排版轉換頓號為換行。</p>
                        </header>

                        {/* 模式切換器 */}
                        <div className="flex justify-center mb-8">
                            <div className="bg-slate-200/60 p-1 rounded-xl shadow-inner inline-flex flex-wrap justify-center gap-1">
                                <button
                                    onClick={() => setMainMode('notarize')}
                                    className={`px-6 py-2.5 rounded-lg text-sm font-bold transition-all duration-200 ${
                                        mainMode === 'notarize' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                    }`}
                                >
                                    公證
                                </button>
                                <button
                                    onClick={() => setMainMode('certify')}
                                    className={`px-6 py-2.5 rounded-lg text-sm font-bold transition-all duration-200 ${
                                        mainMode === 'certify' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                    }`}
                                >
                                    認證
                                </button>
                                <button
                                    onClick={() => setMainMode('booking')}

                                                    <button
                                                        onClick={() => handleCopy(feeCalculationResult.outputText, setCopyFeeResult)}
                                                        className="flex items-center space-x-1 px-3 py-1.5 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-amber-600 transition-colors"
                                                    >
                                                        {copyFeeResult ? <CheckCircleIcon /> : <CopyIcon />}
                                                        <span>{copyFeeResult ? '已複製' : '一鍵複製'}</span>
                                                    </button>
                                                )}
                                            </div>
                                            <div className="p-5 flex-grow bg-[#fafafa]">
                                                { feeCalculationResult.isError ? (
                                                    <div className="text-red-500 font-medium">
                                                        {feeCalculationResult.outputText}
                                                    </div>
                                                ) : (
                                                    <pre className="text-sm font-mono whitespace-pre-wrap text-slate-800 leading-relaxed">
                                                        {feeCalculationResult.outputText}
                                                    </pre>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {(mainMode === 'notarize' || mainMode === 'certify') && (
                                    <div className="space-y-6">
                                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[500px]">
                                            <div className="bg-slate-100 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                                                <h2 className="text-md font-semibold text-slate-800">輸出區 1 (主要訊息)</h2>
                                                <button
                                                    onClick={() => handleCopy(output1Text, setCopyStatus1)}
                                                    className={`flex items-center space-x-1 px-3 py-1.5 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors ${mainMode === 'certify' ? 'hover:text-emerald-600' : 'hover:text-indigo-600'}`}
                                                >
                                                    {copyStatus1 ? <CheckCircleIcon /> : <CopyIcon />}
                                                    <span>{copyStatus1 ? '已複製' : '一鍵複製'}</span>
                                                </button>
                                            </div>
                                            <div className="p-5 flex-grow overflow-auto bg-[#fafafa]">
                                                <pre className="text-sm font-mono whitespace-pre-wrap text-slate-800 leading-relaxed">
                                                    {output1Text}
                                                </pre>
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[280px]">
                                            <div className="bg-slate-100 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                                                <h2 className="text-md font-semibold text-slate-800">輸出區 2 (詢問先行)</h2>
                                                {mainMode === 'notarize' && (
                                                    <button
                                                        onClick={() => handleCopy(output2Text, setCopyStatus2)}
                                                        className="flex items-center space-x-1 px-3 py-1.5 bg-white border border-slate-300 rounded-md text-sm font-medium text-slate-700 hover:bg-slate-50 hover:text-indigo-600 transition-colors"
                                                    >
                                                        {copyStatus2 ? <CheckCircleIcon /> : <CopyIcon />}
                                                        <span>{copyStatus2 ? '已複製' : '一鍵複製'}</span>
                                                    </button>
                                                )}
                                            </div>
                                            <div className="p-5 flex-grow overflow-auto bg-[#fafafa]">
                                                {mainMode === 'notarize' ? (
                                                    <pre className="text-sm font-mono whitespace-pre-wrap text-slate-800 leading-relaxed">
                                                        {output2Text}
                                                    </pre>
                                                ) : (
                                                    <div className="space-y-3">
                                                        {CERT_QUESTIONS.map((text, idx) => (
                                                            <div key={idx} className="flex items-start justify-between p-3 bg-white border border-slate-200 rounded-lg shadow-sm">
                                                                <span className="text-sm text-slate-700 whitespace-pre-wrap flex-grow">{text}</span>
                                                                <button
                                                                    onClick={() => handleCopyLine(text, setCopiedLineIndex, idx)}
                                                                    className="ml-3 flex-shrink-0 flex items-center space-x-1 px-2 py-1 bg-slate-50 border border-slate-300 rounded text-xs font-medium text-slate-600 hover:bg-slate-100 hover:text-emerald-600 transition-colors"
                                                                >
                                                                    {copiedLineIndex === idx ? <CheckCircleIcon className="w-3.5 h-3.5 text-green-500" /> : <CopyIcon className="w-3.5 h-3.5" />}
                                                                    <span>{copiedLineIndex === idx ? '已複製' : '複製'}</span>
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
